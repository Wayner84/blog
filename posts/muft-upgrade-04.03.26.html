# MUFT upgrade

I ran out of filament on the **5th piece** of the prototype — but I didn’t need it to finish to know a lot of the things I need to modify.

---

## V2 design changes

### 1) Split panels + bolt together

First: I need to print the **side panels** and the **base** all separately and then bolt them together.

This will:

- increase overall strength (no more tall, vertical prints)
- let me modify a single panel rather than reprinting the entire design

[Photo placeholder: all finished pieces printed in PETG (ABS later)]

---

### 2) Ventilation

There’s **zero ventilation** in the current build, so I’ve designed a couple vent holes in this V2 base plate.

[Photo placeholder: base plate design (SolidWorks)]

---

### 3) GPU support / sag prevention

I’ve used **brass inserts** under the graphics card so I can use bolts to prevent GPU sag and hold the GPU at a set vertical height.

Since it’s mounted horizontally (facing down), airflow will be pushed out the bottom — and the whole case will be raised to give it room.

---

## Print time improvements

The design is much more modular now.

I’ve split it into:

- **2 × 255 mm²** panels
- the rest are smaller parts that fit on a single plate

That means:

- **3 plates instead of 6**
- significantly less print time (**~9 hours vs ~30**)

---

## Next post

Next post I’ll show:

- all components mounted
- testing it to make sure it still boots
- installing Linux
- testing thermals
- designing the side panels + top shell (with keyboard and trackpad)
